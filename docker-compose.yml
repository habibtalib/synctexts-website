services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/data
    expose:
      - "4321"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:4321/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  app-data:
  caddy-data:
  caddy-config:
