services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/data
    expose:
      - "4321"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:4321/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=stack_web"
      - "traefik.http.routers.synctexts-http.entrypoints=web"
      - "traefik.http.routers.synctexts-http.rule=Host(`synctexts.com`) || Host(`www.synctexts.com`)"
      - "traefik.http.routers.synctexts.entrypoints=websecure"
      - "traefik.http.routers.synctexts.rule=Host(`synctexts.com`) || Host(`www.synctexts.com`)"
      - "traefik.http.routers.synctexts.tls=true"
      - "traefik.http.routers.synctexts.tls.certresolver=le"
      - "traefik.http.services.synctexts.loadbalancer.server.port=4321"
      - "traefik.http.middlewares.synctexts-www.redirectregex.regex=^https?://www\\.synctexts\\.com/(.*)"
      - "traefik.http.middlewares.synctexts-www.redirectregex.replacement=https://synctexts.com/$${1}"
      - "traefik.http.middlewares.synctexts-www.redirectregex.permanent=true"
      - "traefik.http.middlewares.synctexts-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.synctexts-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.synctexts-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.synctexts-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"
      - "traefik.http.routers.synctexts.middlewares=synctexts-www,synctexts-headers"
      - "traefik.http.routers.synctexts-http.middlewares=synctexts-www,synctexts-headers"

networks:
  web:
    external: true
    name: stack_web

volumes:
  app-data:
